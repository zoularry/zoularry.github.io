<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hide Something | Help Center</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        :root {
            --primary-bg: #0a2e29;
            --accent-teal: #20c997;
            --accent-bright: #34e7e4;
            --text-main: #f8f9fa;
            --text-muted: #a0aec0;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(32, 201, 151, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(52, 231, 228, 0.05) 0%, transparent 40%);
        }

        /* --- Header --- */
        header {
            padding: 2rem 1rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .logo-container {
            width: 120px;
            position: relative;
            animation: float 4s ease-in-out infinite;
        }

        .logo-container img {
            width: 100%;
            height: auto;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 2.5rem;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, var(--accent-teal) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 600px;
        }

        /* --- Search Area --- */
        .search-container {
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 1rem 1.5rem;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: white;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .search-bar:focus {
            border-color: var(--accent-teal);
            box-shadow: 0 0 15px rgba(32, 201, 151, 0.2);
        }

        /* --- Content Area --- */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        #markdown-container {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #markdown-container.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Markdown Styling Overrides --- */
        .faq-content h2 {
            font-family: 'Nunito', sans-serif;
            font-size: 1.8rem;
            margin: 3rem 0 1.5rem;
            color: var(--accent-teal);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .faq-content h2::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--glass-border) 0%, transparent 100%);
            margin-left: 1rem;
        }

        .faq-item {
            margin-bottom: 1rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .faq-item:hover {
            border-color: rgba(32, 201, 151, 0.3);
            background: rgba(255, 255, 255, 0.07);
        }

        .faq-question {
            padding: 1.25rem 1.5rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .faq-question strong {
            font-weight: 600;
        }

        .faq-answer {
            padding: 0 1.5rem 1.25rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            display: none;
        }

        .faq-answer blockquote {
            border-left: 3px solid var(--accent-teal);
            padding-left: 1rem;
            margin: 0.5rem 0;
            font-style: normal;
        }

        .faq-item.active .faq-answer {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .faq-question::after {
            content: '+';
            font-size: 1.5rem;
            color: var(--accent-teal);
            transition: transform 0.3s ease;
        }

        .faq-item.active .faq-question::after {
            transform: rotate(45deg);
        }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 4rem 1rem 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .footer-logo {
            width: 40px;
            opacity: 0.5;
            margin-bottom: 1rem;
        }

        /* --- Loading State --- */
        .loading {
            text-align: center;
            padding: 4rem;
            color: var(--accent-teal);
            font-weight: 500;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent-teal);
            border-radius: 50%;
            margin: 0 auto 1rem;
            animation: spin 1s linear infinite;
        }

        /* --- Language Dropdown --- */
        .lang-container {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
        }

        .lang-selector {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .lang-selector:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-teal);
        }

        .lang-selector::after {
            content: '▾';
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        .lang-container.open .lang-selector::after {
            transform: rotate(180deg);
        }

        .lang-dropdown {
            position: absolute;
            top: calc(100% + 0.5rem);
            right: 0;
            background: rgba(15, 50, 45, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 180px;
            padding: 0.5rem;
            display: none;
            flex-direction: column;
            gap: 2px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideDown 0.3s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lang-container.open .lang-dropdown {
            display: flex;
        }

        .lang-dropdown a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .lang-dropdown a:hover {
            background: rgba(32, 201, 151, 0.1);
            color: var(--accent-teal);
        }

        .lang-dropdown a.active {
            color: var(--accent-teal);
            font-weight: 600;
            background: rgba(32, 201, 151, 0.15);
        }

        .lang-dropdown a.active::after {
            content: '✓';
            font-size: 0.8rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="lang-container" id="lang-container">
            <div class="lang-selector" id="lang-selector">Loading...</div>
            <div class="lang-dropdown" id="lang-dropdown"></div>
        </div>
        <div class="logo-container">
            <img src="assets/img/hdsmth_logo.webp" alt="Hide Something Logo" onerror="this.src='https://raw.githubusercontent.com/zoularry/zoularry.github.io/master/assets/img/hdsmth_logo.webp'">
        </div>
        <h1 id="main-title">Help Center</h1>
        <p class="subtitle" id="main-subtitle">Keep your personal life "truly personal" — Hide Something is here to protect your privacy.</p>
    </header>

    <div class="search-container">
        <input type="text" class="search-bar" placeholder="Search for answers..." id="search-input">
    </div>

    <div class="container">
        <div id="markdown-container" class="faq-content">
            <div class="loading">
                <div class="spinner"></div>
                Loading documentation...
            </div>
        </div>
    </div>

    <footer>
        <img src="assets/img/hdsmth_logo.webp" alt="HS" class="footer-logo" onerror="this.style.display='none'">
        <p>&copy; 2026 Hide Something. All rights reserved.</p>
        <p>Keep your personal life "truly personal".</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById('markdown-container');
            const searchInput = document.getElementById('search-input');
            const titleEl = document.getElementById('main-title');
            const subtitleEl = document.getElementById('main-subtitle');
            const langContainer = document.getElementById('lang-container');
            const langSelector = document.getElementById('lang-selector');
            const langDropdown = document.getElementById('lang-dropdown');
            
            const languages = {
                'pt': 'Português',
                'en': 'English',
                'hi': 'हिन्दी',
                'es': 'Español',
                'tr': 'Türkçe',
                'de': 'Deutsch',
                'fr': 'Français',
                'ja': '日本語',
                'ko': '한국어',
                'ar': 'العربية',
                'da': 'Dansk',
                'it': 'Italiano',        
                'nl': 'Nederlands',                
                'ru': 'Русский',                
                'zh': '中文',
                'vi': 'Tiếng Việt'
            };

            const uiStrings = {
                'en': { title: "Help Center", subtitle: "Keep your personal life \"truly personal\" — Hide Something is here to protect your privacy.", search: "Search for answers...", loading: "Loading documentation..." },
                'zh': { title: "帮助中心", subtitle: "让个人生活“真正私密” —— Hide Something 致力于保护您的隐私。", search: "搜索问题...", loading: "正在加载文档..." },
                'ar': { title: "مركز المساعدة", subtitle: "اجعل حياتك الشخصية \"شخصية حقًا\" - Hide Something هنا لحماية خصوصيتك.", search: "بحث عن إجابات...", loading: "جاري تحميل المستندات..." },
                'da': { title: "Hjælpecenter", subtitle: "Hold dit personlige liv \"virkelig personligt\" — Hide Something er her for at beskytte dit privatliv.", search: "Søg efter svar...", loading: "Indlæser dokumentation..." },
                'de': { title: "Hilfe-Center", subtitle: "Halten Sie Ihr Privatleben „wirklich privat“ – Hide Something ist hier, um Ihre Privatsphäre zu schützen.", search: "Nach Antworten suchen...", loading: "Dokumentation wird geladen..." },
                'es': { title: "Centro de Ayuda", subtitle: "Mantenga su vida personal \"realmente personal\": Hide Something está aquí para proteger su privacidad.", search: "Buscar respuestas...", loading: "Cargando documentación..." },
                'fr': { title: "Centre d'Aide", subtitle: "Gardez votre vie privée \"vraiment privée\" — Hide Something est là pour protéger votre confidentialité.", search: "Rechercher des réponses...", loading: "Chargement de la documentation..." },
                'hi': { title: "सहायता केंद्र", subtitle: "अपने निजी जीवन को \"वास्तव में निजी\" रखें — Hide Something आपकी गोपनीयता की रक्षा के लिए यहां है।", search: "जवाब खोजें...", loading: "दस्तावेज़ लोड हो रहा है..." },
                'it': { title: "Centro Assistenza", subtitle: "Mantieni la tua vita personale \"veramente personale\": Hide Something è qui per proteggere la tua privacy.", search: "Cerca risposte...", loading: "Caricamento documentazione..." },
                'ja': { title: "ヘルプセンター", subtitle: "あなたのプライベートな生活を「真に個人的」に保ちます。Hide Somethingはあなたのプライバシーを守ります。", search: "回答を検索...", loading: "ドキュメントを読み込み中..." },
                'ko': { title: "고객센터", subtitle: "당신의 개인적인 삶을 \"진정으로 사적인\" 상태로 유지하세요 — Hide Something은 당신의 프라이버시를 보호합니다.", search: "답변 검색...", loading: "문서 로딩 중..." },
                'nl': { title: "Helpcentrum", subtitle: "Houd uw persoonlijke leven \"echt persoonlijk\" — Hide Something is hier om uw privacy te beschermen.", search: "Zoeken naar antwoorden...", loading: "Documentatie laden..." },
                'pt': { title: "Central de Ajuda", subtitle: "Mantenha sua vida pessoal \"verdadeiramente pessoal\" — o Hide Something está aqui para proteger sua privacidade.", search: "Buscar respostas...", loading: "Carregando documentação..." },
                'ru': { title: "Справочный центр", subtitle: "Сделайте свою личную жизнь «по-настоящему личной» — Hide Something здесь, чтобы защитить вашу конфиденциальность.", search: "Поиск ответов...", loading: "Загрузка документации..." },
                'tr': { title: "Yardım Merkezi", subtitle: "Kişisel hayatınızı \"gerçekten kişisel\" tutun — Hide Something gizliliğinizi korumak için burada.", search: "Cevapları ara...", loading: "Dokümantasyon yükleniyor..." },
                'vi': { title: "Trung tâm Trợ giúp", subtitle: "Giữ cho cuộc sống cá nhân của bạn \"thực sự riêng tư\" — Hide Something ở đây để bảo vệ quyền riêng tư của bạn.", search: "Tìm kiếm câu trả lời...", loading: "Đang tải tài liệu..." }
            };
            
            // Language detection
            const urlParams = new URLSearchParams(window.location.search);
            let lang = urlParams.get('lang');
            
            if (!lang) {
                const browserLang = (navigator.language || navigator.userLanguage || 'en').split('-')[0].toLowerCase();
                lang = languages[browserLang] ? browserLang : 'en';
            }
            
            const currentStrings = uiStrings[lang] || uiStrings['en'];
            const isRtl = lang === 'ar';
            
            if (isRtl) document.body.style.direction = 'rtl';

            // Init Selector
            langSelector.innerText = languages[lang] || 'English';
            
            // Toggle Dropdown
            langSelector.addEventListener('click', (e) => {
                e.stopPropagation();
                langContainer.classList.toggle('open');
            });

            document.addEventListener('click', () => langContainer.classList.remove('open'));

            // Generate Dropdown Items
            Object.keys(languages).forEach(l => {
                const a = document.createElement('a');
                a.href = `?lang=${l}`;
                a.innerText = languages[l];
                if (l === lang) a.classList.add('active');
                langDropdown.appendChild(a);
            });

            // Update UI
            titleEl.innerText = currentStrings.title;
            subtitleEl.innerText = currentStrings.subtitle;
            searchInput.placeholder = currentStrings.search;
            container.querySelector('.loading').innerHTML = `<div class="spinner"></div>${currentStrings.loading}`;
            
            const timestamp = new Date().getTime();
            const mdFile = lang === 'en' ? 'hs_help.md' : `hs_help_${lang}.md`;
            const mdUrl = `md/${mdFile}?t=${timestamp}`;

            fetch(mdUrl)
                .then(response => {
                    if (!response.ok) throw new Error(`Load failed: ${response.status}`);
                    return response.text();
                })
                .then(text => {
                    // Preprocess Markdown, convert to accordion structure
                    const html = marked.parse(text);
                    container.innerHTML = processHtml(html);
                    
                    // Delay adding loaded class to trigger enter animation
                    setTimeout(() => {
                        container.classList.add('loaded');
                        initFaqs();
                    }, 100);
                })
                .catch(error => {
                    console.error('Error:', error);
                    container.innerHTML = `<p style="color: #ff6b6b; text-align: center;">Failed to load documentation. Please check your network or try again later.</p>`;
                });

            // Convert raw HTML to Accordion structure
            function processHtml(html) {
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = html;
                
                let processedHtml = '';
                let currentFaqItem = null;

                // Iterate through parsed elements
                Array.from(tempDiv.children).forEach(el => {
                    if (el.tagName === 'H2') {
                        processedHtml += el.outerHTML;
                    } else if (el.tagName === 'UL') {
                        // Process Q&A in lists
                        Array.from(el.children).forEach(li => {
                            const lines = li.innerHTML.split('\n');
                            const question = li.querySelector('strong') ? li.querySelector('strong').innerText : li.innerText.split('\n')[0];
                            const answer = li.innerHTML.replace(/<strong>.*?<\/strong>/, '').trim();

                            processedHtml += `
                                <div class="faq-item">
                                    <div class="faq-question"><span>${question}</span></div>
                                    <div class="faq-answer">${answer}</div>
                                </div>
                            `;
                        });
                    } else {
                        processedHtml += el.outerHTML;
                    }
                });

                return processedHtml;
            }

            // Initialize Accordion interactions
            function initFaqs() {
                const items = document.querySelectorAll('.faq-item');
                items.forEach(item => {
                    const question = item.querySelector('.faq-question');
                    question.addEventListener('click', () => {
                        const isActive = item.classList.contains('active');
                        
                        // Close other items (optional)
                        // document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('active'));
                        
                        if (!isActive) {
                            item.classList.add('active');
                        } else {
                            item.classList.remove('active');
                        }
                    });
                });
            }

            // Search functionality
            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const items = document.querySelectorAll('.faq-item');
                
                items.forEach(item => {
                    const text = item.innerText.toLowerCase();
                    if (text.includes(term)) {
                        item.style.display = 'block';
                    } else {
                        item.style.display = 'none';
                    }
                });

                // Hide H2 headers that have no matching items
                const headers = document.querySelectorAll('.faq-content h2');
                headers.forEach(h2 => {
                    let next = h2.nextElementSibling;
                    let hasVisible = false;
                    while (next && next.tagName !== 'H2') {
                        if (next.classList.contains('faq-item') && next.style.display !== 'none') {
                            hasVisible = true;
                            break;
                        }
                        next = next.nextElementSibling;
                    }
                    h2.style.display = hasVisible || term === '' ? 'flex' : 'none';
                });
            });
        });
    </script>
</body>
</html>
