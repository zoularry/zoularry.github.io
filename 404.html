<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to Device...</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f5;
            color: #18181b;
        }
        .container {
            text-align: center;
            padding: 2.5rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 420px;
            width: 90%;
        }
        h2 { margin-top: 0; font-size: 1.5rem; font-weight: 600; color: #000; }
        p { color: #52525b; font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-text { color: #ef4444; }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // 获取路径并移除前导斜杠
            const path = window.location.pathname.replace(/^\/+/, '');
            
            const titleEl = document.getElementById('status-title');
            const descEl = document.getElementById('status-desc');
            let targetIp = "";

            // 路由逻辑推导
            if (/^0\d+$/.test(path)) {
                // 规则 1: 0开头 (如 031) -> 192.168.0.31
                const suffix = parseInt(path, 10);
                targetIp = `192.168.0.${suffix}`;
            } else if (/^\d+$/.test(path)) {
                // 规则 2: 纯数字 (如 31) -> 192.168.1.31
                targetIp = `192.168.1.${path}`;
            } else if (/^\d+(\.\d+)+$/.test(path)) {
                // 规则 3: 带点的路径 (如 3.31) -> 192.168.3.31
                targetIp = `192.168.${path}`;
            }

            if (targetIp) {
                // 执行跳转
                const targetUrl = `http://${targetIp}:9999`;
                window.location.replace(targetUrl);
            } else {
                // 无法识别的路径
                document.querySelector('.loader').style.display = 'none';
                titleEl.textContent = "404 Not Found";
                titleEl.classList.add("error-text");
                descEl.textContent = "Invalid short code. Please check the address displayed in your app.";
            }
        });
    </script>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2 id="status-title">Connecting to device...</h2>
        <p id="status-desc">Redirecting to your local network. Make sure this computer is on the same Wi-Fi.</p>
    </div>
</body>
</html>
